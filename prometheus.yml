global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'autonomous-agent-monitor'

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          service: 'prometheus'

  - job_name: 'autonomous-agent'
    scrape_interval: 10s
    static_configs:
      - targets: ['host.docker.internal:8000']
        labels:
          service: 'agent-backend'
          environment: 'development'
    metrics_path: '/metrics/prometheus'
    scheme: 'http'
