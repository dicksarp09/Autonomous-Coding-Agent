# CI/CD Pipeline for Autonomous Coding Agent

name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
  LANGSMITH_API_KEY: ${{ secrets.LANGSMITH_API_KEY }}
  LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}

jobs:
  # ==================== Backend Tests ====================
  test-backend:
    name: Backend Test & Build
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r agent/requirements.txt
          pip install -r requirements.txt
          pip install -e .

      - name: Run linting
        run: |
          ruff check agent/ --exit-zero
          bandit -r agent/ --exit-zero

      - name: Run unit tests
        run: |
          pytest agent/tests/ -v --tb=short

      - name: Build Docker image
        run: |
          docker build -t coding-agent-backend:${{ github.sha }} -f Dockerfile.backend .

      - name: Run container health check
        run: |
          docker run -d --name test-backend -p 8001:8000 coding-agent-backend:${{ github.sha }}
          sleep 5
          curl -f http://localhost:8001/docs || exit 1
          docker stop test-backend

  # ==================== Frontend Tests ====================
  test-frontend:
    name: Frontend Test & Build
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Run linting
        run: |
          cd frontend
          npm run lint || true

      - name: Run tests
        run: |
          cd frontend
          npm run test -- --passWithNoTests || true

      - name: Build frontend
        run: |
          cd frontend
          npm run build

  # ==================== Integration Tests ====================
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r agent/requirements.txt
          pip install -r requirements.txt
          pip install pytest httpx

      - name: Run integration tests
        run: |
          # Start backend in background
          python backend/run.py &
          sleep 5
          
          # Run integration tests
          pytest agent/tests/test_evaluation.py -v
          
          # Stop backend
          pkill -f "python backend/run.py" || true

  # ==================== Security Scan ====================
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Bandit security scan
        uses: secfigo/bandit-action@v1.0.0
        with:
          path: './agent'
          exit_zero: true

      - name: Run Safety dependency check
        uses: pyupio/safety-action@v1.0.0
        with:
          api-key: ${{ secrets.SAFETY_API_KEY }}
          exit_zero: true

  # ==================== Build & Push ====================
  build-and-push:
    name: Build and Push Docker
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend, integration-tests]
    if: github.event_name == 'push'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.backend
          push: true
          tags: |
            codingagent/backend:${{ github.sha }}
            codingagent/backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: Dockerfile
          push: true
          tags: |
            codingagent/frontend:${{ github.sha }}
            codingagent/frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ==================== Deploy ====================
  deploy:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/develop'
    
    steps:
      - name: Deploy to staging
        run: |
          echo \"Deploying to staging environment...\"
          # Add your deployment commands here
          # e.g., kubectl, docker-compose, etc.
